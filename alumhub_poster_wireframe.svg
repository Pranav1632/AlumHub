  <!-- Bottom description -->
  <rect class="panel" x="180" y="2240" width="2040" height="780"/>
  <text class="h" x="220" y="2320">Concept Summary</text>
  <line class="line" x1="220" y1="2350" x2="2180" y2="2350"/>
  <text class="t" x="220" y="2420">AlumHub is designed to bridge students and alumni through a focused academic community platform.</text>
  <text class="t" x="220" y="2480">The dashboard centralizes networking updates, mentorship access, career opportunities, and event discovery</text>
  <text class="t" x="220" y="2540">in a clean, structured interface. By combining alumni guidance, peer discussions, and referral-driven hiring pathways,</text>
  <text class="t" x="220" y="2600">the platform supports practical career growth and stronger long-term professional connections.</text>

  <rect class="mini" x="220" y="2670" width="640" height="300"/>
  <text class="cap" x="250" y="2720">Design Notes</text>
  <line class="thin" x1="250" y1="2760" x2="820" y2="2760"/>
  <text class="small" x="250" y="2810">• Wireframe grayscale for UX clarity</text>
  <text class="small" x="250" y="2860">• Balanced grid and consistent spacing</text>
  <text class="small" x="250" y="2910">• Section-based product design presentation</text>

  <rect class="mini" x="910" y="2670" width="640" height="300"/>
  <text class="cap" x="940" y="2720">Audience</text>
  <line class="thin" x1="940" y1="2760" x2="1510" y2="2760"/>
  <text class="small" x="940" y="2810">• Students seeking guidance and internships</text>
  <text class="small" x="940" y="2860">• Alumni offering mentorship and referrals</text>
  <text class="small" x="940" y="2910">• Campus communities and placement teams</text>

  <rect class="mini" x="1600" y="2670" width="620" height="300"/>
