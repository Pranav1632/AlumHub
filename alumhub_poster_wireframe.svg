  <line class="thin" x1="1630" y1="2760" x2="2190" y2="2760"/>
  <text class="small" x="1630" y="2810">• High-resolution 2400 × 3400 layout</text>
  <text class="small" x="1630" y="2860">• Suitable for UX case study presentations</text>
  <text class="small" x="1630" y="2910">• Editable vector for quick iteration</text>
